# ----------------------------------------------------------------------------
# Fast Track — Android R8 / ProGuard rules.
# MAUI ships sensible defaults; this file tops them up for the three packages
# that use reflection in ways the shrinker can't see through.
# ----------------------------------------------------------------------------

# sqlite-net-pcl uses reflection to map [Table]/[Column] attributes onto the
# concrete model classes. Without these keep rules the Release build either
# strips the model types or strips their property metadata, and the DB layer
# starts handing back empty rows.
-keep class FastTrack.Data.** { *; }
-keep class FastTrack.Models.** { *; }
-keepclassmembers class * {
    @SQLite.TableAttribute *;
    @SQLite.ColumnAttribute *;
    @SQLite.PrimaryKeyAttribute *;
}

# SkiaSharp + Microcharts.Maui load the native skiasharp library at runtime via
# JNI; the linker can drop the wrapper types if it can't see a managed call site.
-keep class SkiaSharp.** { *; }
-keep class Microcharts.** { *; }

# Plugin.LocalNotification registers BroadcastReceivers + a foreground service
# via Android attributes that R8 doesn't always preserve in Release.
-keep class Plugin.LocalNotification.** { *; }
-keep class * extends android.content.BroadcastReceiver { *; }
-keep class * extends android.app.Service { *; }

# Keep custom drawables / view subclasses referenced from XAML so the linker
# doesn't trim the parameterless constructor MAUI looks up reflectively.
-keep class FastTrack.Helpers.** { *; }

# Keep Java entry points generated by Xamarin.Android for any class that
# inherits from a Java type — covers MainActivity, MainApplication, etc.
-keepattributes *Annotation*
-keepclasseswithmembers class * {
    native <methods>;
}
