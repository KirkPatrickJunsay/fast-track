<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none">
  <!-- Soft halo -->
  <circle cx="80" cy="80" r="60" fill="#4A3FBE" opacity="0.15"/>
  <!-- Clock face -->
  <circle cx="80" cy="80" r="44" fill="#1C1B1B" stroke="#C4C0FF" stroke-width="3"/>
  <circle cx="80" cy="80" r="44" fill="#7A6FD8" opacity="0.12"/>
  <!-- Hour ticks -->
  <line x1="80" y1="40" x2="80" y2="46" stroke="#C4C0FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="114" x2="80" y2="120" stroke="#C4C0FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="80" x2="46" y2="80" stroke="#C4C0FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="114" y1="80" x2="120" y2="80" stroke="#C4C0FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hands -->
  <line x1="80" y1="80" x2="80" y2="56" stroke="#A9D38B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="80" x2="100" y2="80" stroke="#C4C0FF" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="80" cy="80" r="4" fill="#FFE3B0"/>
  <!-- Sparkle -->
  <circle cx="128" cy="36" r="2" fill="#FFE3B0"/>
  <circle cx="32" cy="32" r="1.5" fill="#FFE3B0" opacity="0.7"/>
</svg>
