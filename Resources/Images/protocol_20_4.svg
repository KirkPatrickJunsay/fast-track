<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Halo -->
  <circle cx="60" cy="60" r="54" fill="#4A3FBE" opacity="0.18"/>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Fasting arc (20h ≈ 300°) -->
  <path d="M 60 22 A 38 38 0 1 1 41 28.5" fill="none" stroke="#C4C0FF" stroke-width="10" stroke-linecap="round"/>
  <!-- Eating arc (4h ≈ 60°) — narrow wedge at the top -->
  <path d="M 41 28.5 A 38 38 0 0 1 60 22" fill="none" stroke="#FFB3B5" stroke-width="10" stroke-linecap="round"/>
  <!-- Sword/warrior accent below center -->
  <path d="M 60 80 L 60 96" stroke="#FFE3B0" stroke-width="2" stroke-linecap="round"/>
  <path d="M 54 84 L 66 84" stroke="#FFE3B0" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="4" fill="#FFE3B0"/>
  <circle cx="60" cy="22" r="2" fill="#FFE3B0"/>
  <text x="60" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#C4C0FF">20</text>
  <text x="60" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFB3B5" font-weight="600">:4</text>
</svg>
