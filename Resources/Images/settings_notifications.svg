<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Halo -->
  <circle cx="60" cy="60" r="54" fill="#4A3FBE" opacity="0.18"/>
  <!-- Bell body -->
  <path d="M 60 28
           C 76 28, 84 40, 84 56
           L 84 74
           L 90 82
           L 30 82
           L 36 74
           L 36 56
           C 36 40, 44 28, 60 28 Z"
        fill="#C4C0FF"/>
  <path d="M 60 28
           C 76 28, 84 40, 84 56
           L 84 74
           L 90 82
           L 30 82
           L 36 74
           L 36 56
           C 36 40, 44 28, 60 28 Z"
        fill="none" stroke="#7A6FD8" stroke-width="2"/>
  <!-- Bell knob on top -->
  <rect x="56" y="22" width="8" height="6" rx="2" fill="#7A6FD8"/>
