<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Halo -->
  <circle cx="60" cy="60" r="54" fill="#4A3FBE" opacity="0.18"/>
  <!-- Gear teeth (8 spokes via rotated rects) -->
  <g fill="#C4C0FF" stroke="#7A6FD8" stroke-width="2" stroke-linejoin="round">
    <rect x="54" y="20" width="12" height="14" rx="2"/>
    <rect x="54" y="86" width="12" height="14" rx="2"/>
    <rect x="20" y="54" width="14" height="12" rx="2"/>
    <rect x="86" y="54" width="14" height="12" rx="2"/>
    <rect x="32" y="32" width="12" height="14" rx="2" transform="rotate(-45 38 39)"/>
    <rect x="76" y="32" width="12" height="14" rx="2" transform="rotate(45 82 39)"/>
    <rect x="32" y="74" width="12" height="14" rx="2" transform="rotate(45 38 81)"/>
    <rect x="76" y="74" width="12" height="14" rx="2" transform="rotate(-45 82 81)"/>
  </g>
  <!-- Gear ring -->
  <circle cx="60" cy="60" r="26" fill="#C4C0FF"/>
  <circle cx="60" cy="60" r="26" fill="none" stroke="#7A6FD8" stroke-width="2"/>
  <!-- Inner hub -->
  <circle cx="60" cy="60" r="12" fill="#1C1B1B"/>
  <circle cx="60" cy="60" r="12" fill="none" stroke="#7A6FD8" stroke-width="2"/>
  <!-- Hub dot -->
  <circle cx="60" cy="60" r="4" fill="#FFE3B0"/>
</svg>
