<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Halo -->
  <circle cx="60" cy="60" r="54" fill="#4A3FBE" opacity="0.18"/>
  <!-- Database / stack — three discs -->
  <!-- Top disc -->
  <ellipse cx="60" cy="34" rx="28" ry="8" fill="#C4C0FF"/>
  <ellipse cx="60" cy="34" rx="28" ry="8" fill="none" stroke="#7A6FD8" stroke-width="2"/>
  <!-- Middle slab -->
  <path d="M 32 34 V 60 C 32 64, 44 68, 60 68 C 76 68, 88 64, 88 60 V 34" fill="#C4C0FF"/>
  <path d="M 32 60 C 32 64, 44 68, 60 68 C 76 68, 88 64, 88 60" stroke="#7A6FD8" stroke-width="2" fill="none"/>
  <path d="M 32 34 V 60" stroke="#7A6FD8" stroke-width="2"/>
  <path d="M 88 34 V 60" stroke="#7A6FD8" stroke-width="2"/>
  <!-- Bottom slab -->
  <path d="M 32 60 V 86 C 32 90, 44 94, 60 94 C 76 94, 88 90, 88 86 V 60" fill="#C4C0FF"/>
  <path d="M 32 86 C 32 90, 44 94, 60 94 C 76 94, 88 90, 88 86" stroke="#7A6FD8" stroke-width="2" fill="none"/>
  <path d="M 32 60 V 86" stroke="#7A6FD8" stroke-width="2"/>
  <path d="M 88 60 V 86" stroke="#7A6FD8" stroke-width="2"/>
  <!-- Activity dot on each band (status lights) -->
  <circle cx="44" cy="48" r="2.5" fill="#A9D38B"/>
  <circle cx="44" cy="74" r="2.5" fill="#A9D38B"/>
  <!-- Export arrow (sage out) -->
  <path d="M 94 50 L 102 50 M 98 46 L 102 50 L 98 54"
        stroke="#A9D38B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Import arrow (brick in) -->
  <path d="M 26 74 L 18 74 M 22 70 L 18 74 L 22 78"
        stroke="#FFB3B5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
