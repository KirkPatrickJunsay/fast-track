<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- Halo -->
  <circle cx="60" cy="60" r="54" fill="#4A3FBE" opacity="0.18"/>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Fasting arc (18h ≈ 270°) -->
  <path d="M 60 22 A 38 38 0 1 1 22 60" fill="none" stroke="#C4C0FF" stroke-width="10" stroke-linecap="round"/>
  <!-- Eating arc (6h ≈ 90°) — smaller sage wedge -->
  <path d="M 22 60 A 38 38 0 0 1 60 22" fill="none" stroke="#A9D38B" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="4" fill="#FFE3B0"/>
  <circle cx="60" cy="22" r="2" fill="#FFE3B0"/>
  <circle cx="98" cy="60" r="2" fill="#FFE3B0" opacity="0.7"/>
  <circle cx="60" cy="98" r="2" fill="#FFE3B0" opacity="0.7"/>
  <circle cx="22" cy="60" r="2" fill="#FFE3B0" opacity="0.7"/>
  <text x="60" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#C4C0FF">18</text>
  <text x="60" y="74" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A9D38B" font-weight="600">:6</text>
</svg>
