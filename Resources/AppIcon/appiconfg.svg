<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!--
    Fast Track app icon — foreground mark.
    Lives inside the centred ~264×264 adaptive-icon safe zone.
    Layout: soft halo → dark track → indigo fasting arc → sage eating arc → cream hub.
    No floating accents — every element earns its place so the mark reads cleanly at 48dp.
  -->

  <!-- Soft outer halo for depth on square masks; gets cropped on circular masks. -->
  <circle cx="228" cy="228" r="180" fill="#4A3FBE" opacity="0.20"/>

  <!-- Inner glow that survives the circular crop. -->
  <circle cx="228" cy="228" r="138" fill="#4A3FBE" opacity="0.15"/>

  <!-- Track — sits behind both arcs so the seam between them is invisible. -->
  <circle cx="228" cy="228" r="110" fill="none" stroke="#2A2A2A" stroke-width="40"/>

  <!--
    Fasting arc — indigo, ~240° starting at top, sweeping clockwise.
    A 2° overlap with the eating arc hides any rendering seam.
  -->
  <path d="M 228 118
           A 110 110 0 1 1 130.7 273.5"
        fill="none" stroke="#C4C0FF" stroke-width="40" stroke-linecap="round"/>

  <!--
    Eating arc — sage, the remaining ~120° back to the top.
  -->
  <path d="M 130.7 273.5
           A 110 110 0 0 1 228 118"
        fill="none" stroke="#A9D38B" stroke-width="40" stroke-linecap="round"/>

  <!--
    Centre hub — a clear focal point. Two-tone for a subtle "lit" feel.
  -->
  <circle cx="228" cy="228" r="34" fill="#FFE3B0"/>
  <circle cx="228" cy="228" r="34" fill="none" stroke="#C26B6E" stroke-width="2" opacity="0.6"/>
  <circle cx="222" cy="222" r="10" fill="#FFFFFF" opacity="0.45"/>
</svg>
