<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="240" height="240" viewBox="0 0 240 240" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!--
    Fast Track splash — small ring + wordmark, both inside a 100-unit safe radius
    around centre (120, 120). With BaseSize="192,192" the SVG renders at 0.8× scale,
    so the system splash icon mask (192dp+ on every OEM) lands at SVG radius 120,
    leaving 20 units of buffer between our outermost content and the mask edge.
  -->

  <!-- Track (small ring in the upper half of the canvas). -->
  <circle cx="120" cy="85" r="28" fill="none" stroke="#2A2A2A" stroke-width="10"/>

  <!-- Fasting arc (indigo, ~240° clockwise from top). -->
  <path d="M 120 57
           A 28 28 0 1 1 95.1 104.4"
        fill="none" stroke="#C4C0FF" stroke-width="10" stroke-linecap="round"/>

  <!-- Eating arc (sage, ~120° back to top). -->
  <path d="M 95.1 104.4
           A 28 28 0 0 1 120 57"
        fill="none" stroke="#A9D38B" stroke-width="10" stroke-linecap="round"/>

  <!-- Centre hub — small focal point inside the ring. -->
  <circle cx="120" cy="85" r="8" fill="#FFE3B0"/>

  <!--
    Wordmark — sits below the ring in the lower half of the canvas.
    fs=20, letter-spacing 3, weight 700 → ~137px wide, comfortably inside the safe radius.
  -->
  <text x="120" y="170"
        text-anchor="middle"
        font-family="sans-serif"
        font-size="20"
        font-weight="700"
        letter-spacing="3"
        fill="#FAFAFA">FAST TRACK</text>
</svg>
